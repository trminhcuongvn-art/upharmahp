const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let W=0,H=0,DPR=1;function resize(){DPR=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();
const UI={hpFill:gid('hpFill'),hpTxt:gid('hpTxt'),lvlTxt:gid('lvlTxt'),xpFill:gid('xpFill'),xpTxt:gid('xpTxt'),evoFill:gid('evoFill'),evoTxt:gid('evoTxt'),stats:gid('stats'),banner:gid('banner'),call:gid('call'),modal:gid('levelModal'),cards:gid('cards'),end:gid('end'),endTitle:gid('endTitle'),endText:gid('endText'),coins:gid('coins'),ups:gid('ups'),bronze:gid('bronze'),stone:gid('stone'),joy:gid('joy'),knob:gid('knob')};function gid(x){return document.getElementById(x)}

function newState(){state={t:0,over:false,victory:false,wave:1,waveTimer:0,bossSpawned:false,kills:0,coinsRun:0,era:'stone',evo:0,bannerT:0,shake:0,spawnLeft:0,enemies:[],projs:[],eprojs:[],orbs:[],fires:[],pets:[],hero:{x:arena.w/2,y:arena.h/2,r:18,hp:120+meta.hp*20,maxHp:120+meta.hp*20,spd:210*(1+meta.spd*.08),lvl:1,xp:0,next:30,atkCd:0,inv:0,shield:false,shieldT:0,spikeT:0},skills:{multi:0,pierce:0,fire:0,shield:0,speed:0,beast:0,spike:0,damage:0}};paused=false;UI.end.style.display='none';UI.modal.style.display='none';UI.bronze.className='node';UI.stone.className='node current';call('Survive 6 waves. Auto attack is on.');startWave(1)}

function startWave(n){state.wave=n;state.waveTimer=0;let count=8+n*7;state.spawnLeft=count;call(n<=6?'Wave '+n:'Mammoth King approaches!')}
function spawnEnemy(type){let a=Math.random()*TAU,dist=Math.max(W,H)*.8+300,x=state.hero.x+Math.cos(a)*dist,y=state.hero.y+Math.sin(a)*dist;x=Math.max(40,Math.min(arena.w-40,x));y=Math.max(40,Math.min(arena.h-40,y));let e={type,x,y,vx:0,vy:0,lastHit:0,burn:0,burnD:0,tele:0,charge:0,throwCd:1+Math.random(),phase:0};if(type==='boar')Object.assign(e,{hp:35,r:18,spd:115,dmg:12,emoji:'🐗'});if(type==='wolf')Object.assign(e,{hp:28,r:15,spd:150,dmg:10,emoji:'🐺',zig:Math.random()*6});if(type==='boss')Object.assign(e,{hp:1400,r:55,spd:75,dmg:22,emoji:'🐘',boss:true,attackT:2,maxHp:1400});state.enemies.push(e)}
function loop(now){let dt=Math.min(.033,(now-last)/1000||0);last=now;if(!paused&&!state.over)update(dt);draw();if(!state.over||UI.end.style.display==='none')raf=requestAnimationFrame(loop)}
function update(dt){state.t+=dt;let h=state.hero;h.inv=Math.max(0,h.inv-dt);h.atkCd-=dt;state.waveTimer+=dt;if(h.shieldT>0)h.shieldT-=dt;else if(state.skills.shield>0){h.shield=true;h.shieldT=12-state.skills.shield*2}spawnLogic(dt);moveHero(dt);camera(dt);autoAttack(dt);updateProjectiles(dt);updateEnemies(dt);updateOrbs(dt);updateFires(dt);updatePets(dt);checkWave();updateHUD()}

function moveHero(dt){let x=(keys.d||keys.ArrowRight?1:0)-(keys.a||keys.ArrowLeft?1:0)+touchVec.x,y=(keys.s||keys.ArrowDown?1:0)-(keys.w||keys.ArrowUp?1:0)+touchVec.y,l=Math.hypot(x,y)||1;if(x||y){state.hero.x+=x/l*state.hero.spd*(1+state.skills.speed*.12)*dt;state.hero.y+=y/l*state.hero.spd*(1+state.skills.speed*.12)*dt}state.hero.x=Math.max(25,Math.min(arena.w-25,state.hero.x));state.hero.y=Math.max(25,Math.min(arena.h-25,state.hero.y))}
function camera(dt){cam.x+=(state.hero.x-W/2-cam.x)*Math.min(1,dt*7);cam.y+=(state.hero.y-H/2-cam.y)*Math.min(1,dt*7);cam.x=Math.max(0,Math.min(arena.w-W,cam.x));cam.y=Math.max(0,Math.min(arena.h-H,cam.y))}
function autoAttack(){let h=state.hero,range=state.era==='bronze'?520:460,target=null,bd=1e9;for(const e of state.enemies){let d=dist(h,e);if(d<range&&d<bd){bd=d;target=e}}if(target&&h.atkCd<=0){let baseInt=state.era==='bronze'?.75:.9;h.atkCd=baseInt/(1+meta.atk*.06);let n=1+state.skills.multi,ang=Math.atan2(target.y-h.y,target.x-h.x);for(let i=0;i<n;i++){let off=(i-(n-1)/2)*.22;fireProj(ang+off)} }}
function fireProj(ang){let bronze=state.era==='bronze';if(state.projs.length>=MAX_PROJS)state.projs.shift();state.projs.push({x:state.hero.x,y:state.hero.y,vx:Math.cos(ang)*(bronze?520:400),vy:Math.sin(ang)*(bronze?520:400),r:7,life:bronze?1.35:1.2,dmg:(18*(1+state.skills.damage*.2+meta.atk*.1))*(bronze?1.25:1),pierce:(bronze?1:0)+state.skills.pierce,color:bronze?'#ff9b38':'#c9c0aa'})}
function updateProjectiles(dt){for(let i=state.projs.length-1;i>=0;i--){let p=state.projs[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;if(state.skills.fire){if(state.fires.length>=MAX_FIRES)state.fires.shift();state.fires.push({x:p.x,y:p.y,r:18+state.skills.fire*3,t:.45,dmg:10+state.skills.fire*5})};let rem=p.life<=0;for(const e of state.enemies){if(!e.dead&&Math.hypot(e.x-p.x,e.y-p.y)<e.r+p.r){hitEnemy(e,p.dmg);if(state.skills.fire){e.burn=2+state.skills.fire*.5;e.burnD=6+state.skills.fire*2}spark(e.x,e.y,p.color);p.pierce--;if(p.pierce<0){rem=true;break}}}if(rem)state.projs.splice(i,1)}for(let i=state.eprojs.length-1;i>=0;i--){let p=state.eprojs[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;if(Math.hypot(p.x-state.hero.x,p.y-state.hero.y)<p.r+state.hero.r){damageHero(p.dmg);state.eprojs.splice(i,1)}else if(p.life<=0)state.eprojs.splice(i,1)}}
function hitEnemy(e,d){e.hp-=d;if(e.hp<=0&&!e.dead){e.dead=true;state.kills++;state.coinsRun+=e.boss?60:(e.type==='boar'?1:2);state.evo=Math.min(100,state.evo+(e.boss?0:2)*(1+meta.evo*.12));let drops=e.boss?0:1;for(let k=0;k<drops;k++){if(state.orbs.length>=MAX_ORBS)state.orbs.shift();state.orbs.push({x:e.x+(Math.random()-.5)*30,y:e.y+(Math.random()-.5)*30,v:5,r:8,mag:false})};if(e.boss)win();if(state.evo>=100&&state.era==='stone')eraShift()}}
function updateEnemies(dt){let h=state.hero;for(let i=state.enemies.length-1;i>=0;i--){let e=state.enemies[i];if(e.dead){state.enemies.splice(i,1);continue}if(e.burn>0){e.burn-=dt;hitEnemy(e,e.burnD*dt)}let dx=h.x-e.x,dy=h.y-e.y,d=Math.hypot(dx,dy)||1;if(e.boss){bossAI(e,dt,dx,dy,d)}else{let ang=Math.atan2(dy,dx)+(e.type==='wolf'?Math.sin(state.t*3+e.zig)*.45:0);e.x+=Math.cos(ang)*e.spd*dt;e.y+=Math.sin(ang)*e.spd*dt}if(d<e.r+h.r&&state.t-e.lastHit>.8){e.lastHit=state.t;damageHero(e.dmg)}}}
function bossAI(e,dt,dx,dy,d){e.attackT-=dt;if(e.charge>0){e.charge-=dt;e.x+=e.vx*dt;e.y+=e.vy*dt;state.shake=.08;return}if(e.tele>0){e.tele-=dt;if(e.tele<=0){let a=Math.atan2(dy,dx);e.charge=.55;e.vx=Math.cos(a)*430;e.vy=Math.sin(a)*430}return}e.x+=dx/d*e.spd*dt;e.y+=dy/d*e.spd*dt;if(e.attackT<=0){e.attackT=3.2;if(Math.random()<.55){e.tele=.75;call('Mammoth charge!')}else{for(let a=0;a<TAU;a+=TAU/10)state.eprojs.push({x:e.x,y:e.y,vx:Math.cos(a)*230,vy:Math.sin(a)*230,r:10,dmg:24,life:2.4});state.shake=.2;call('Mammoth stomp shockwave!')}}}
function damageHero(d){let h=state.hero;if(h.inv>0)return;if(h.shield){h.shield=false;h.inv=.25;call('Shield blocked!');return}if(Math.random()<state.skills.speed*.05){call('Dodged!');return}h.hp-=d;h.inv=.6;state.shake=.15;if(h.hp<=0)lose()}
function updateOrbs(dt){let h=state.hero;for(let i=state.orbs.length-1;i>=0;i--){let o=state.orbs[i],d=Math.hypot(h.x-o.x,h.y-o.y);if(d<140)o.mag=true;if(o.mag){let md=d||1;o.x+=(h.x-o.x)/md*420*dt;o.y+=(h.y-o.y)/md*420*dt}if(d<h.r+o.r){h.xp+=o.v;state.orbs.splice(i,1);if(h.xp>=h.next)levelUp()}}}
function updateFires(dt){for(let i=state.fires.length-1;i>=0;i--){let f=state.fires[i];f.t-=dt;for(const e of state.enemies)if(Math.hypot(e.x-f.x,e.y-f.y)<e.r+f.r)hitEnemy(e,f.dmg*dt);if(f.t<=0)state.fires.splice(i,1)}}
function updatePets(dt){while(state.pets.length<state.skills.beast)state.pets.push({x:state.hero.x,y:state.hero.y,atk:0});for(const p of state.pets){let tar=null,bd=1e9;for(const e of state.enemies){let d=Math.hypot(e.x-p.x,e.y-p.y);if(d<bd){bd=d;tar=e}}if(tar){p.x+=(tar.x-p.x)/(bd||1)*260*dt;p.y+=(tar.y-p.y)/(bd||1)*260*dt;p.atk-=dt;if(bd<30&&p.atk<=0){p.atk=.5;hitEnemy(tar,14)}}else{p.x+=(state.hero.x-p.x)*dt*2;p.y+=(state.hero.y-p.y)*dt*2}}}
function checkWave(){if(!state.bossSpawned&&state.wave<=6&&state.spawnLeft<=0&&state.enemies.length===0){state.evo=Math.min(100,state.evo+8);if(state.era==='stone'&&(state.evo>=100||(state.wave>=4&&state.evo>=85)))eraShift();if(state.wave<6)startWave(state.wave+1);else{state.bossSpawned=true;call('BOSS: Mammoth King!');spawnEnemy('boss')}}}
function levelUp(){paused=true;let h=state.hero;h.xp-=h.next;h.lvl++;h.next=h.lvl<5?[0,30,50,80,120][h.lvl]:120+(h.lvl-4)*50;let opts=[...skillPool].filter(s=>state.skills[s[2]]<s[3]);opts.sort(()=>Math.random()-.5);UI.cards.innerHTML='';if(!opts.length){paused=false;UI.modal.style.display='none';call('All skills maxed!');return}opts.slice(0,3).forEach(s=>{let div=document.createElement('div');div.className='card';div.innerHTML=`<h2>${s[0]}</h2><p>${s[1]}</p><small>Stack ${state.skills[s[2]]||0}/${s[3]}</small>`;div.onclick=()=>{state.skills[s[2]]++; if(s[2]==='speed')state.hero.spd*=1.04; paused=false;UI.modal.style.display='none';call(s[0]+' upgraded!')};UI.cards.appendChild(div)});UI.modal.style.display='flex'}
function eraShift(){state.era='bronze';state.evo=100;state.bannerT=2.6;state.shake=.35;UI.banner.innerHTML='ERA SHIFT: BRONZE EMPIRE<br><small>Bronze Javelin faster, stronger, pierces!</small>';UI.bronze.className='node unlocked current';UI.stone.className='node unlocked';call('Stone Age mastered. Bronze Javelin awakened!')}
function win(){state.victory=true;finish(true)}function lose(){finish(false)}function finish(v){state.over=true;paused=true;meta.coins+=state.coinsRun+(v?100:0);saveMeta();UI.endTitle.textContent=v?'VICTORY - Mammoth King Falls!':'DEFEAT - Timeline rewinds';UI.endText.textContent=`Kills ${state.kills} • Wave ${state.wave} • Run coins ${state.coinsRun+(v?100:0)} • Rune Medieval remains LOCKED teaser.`;renderUpgrades();UI.end.style.display='flex'}
function renderUpgrades(){UI.coins.textContent=meta.coins;UI.ups.innerHTML='';[['atk','Attack',40],['hp','HP',35],['spd','Move Speed',35],['evo','Evolution Gain',45]].forEach(([k,n,c])=>{let d=document.createElement('div');d.className='up';d.innerHTML=`<b>${n}</b><br>Level ${meta[k]}<br><button class="btn">Buy ${c}</button>`;d.querySelector('button').onclick=()=>{if(meta.coins>=c){meta.coins-=c;meta[k]++;saveMeta();renderUpgrades()}};UI.ups.appendChild(d)})}function saveMeta(){try{localStorage.epochAscMeta=JSON.stringify(meta)}catch(e){call('Save unavailable in this browser')}}
function updateHUD(){let h=state.hero;UI.hpFill.style.width=Math.max(0,h.hp/h.maxHp*100)+'%';UI.hpTxt.textContent=`HP ${Math.ceil(h.hp)}/${h.maxHp}${h.shield?' 🛡️':''}`;UI.lvlTxt.textContent=`Level ${h.lvl}`;UI.xpFill.style.width=Math.min(100,h.xp/h.next*100)+'%';UI.xpTxt.textContent=`XP ${h.xp|0}/${h.next}`;UI.evoFill.style.width=state.evo+'%';UI.evoTxt.textContent=`Evolution ${state.era==='bronze'?'BRONZE':Math.floor(state.evo)+'/100'}`;UI.stats.innerHTML=`Wave ${state.bossSpawned?'BOSS':state.wave}/6<br>Kills ${state.kills}<br>Time ${fmt(state.t)}`;if(state.bannerT>0){state.bannerT-=.016;UI.banner.style.opacity=Math.min(1,state.bannerT)}else UI.banner.style.opacity=0}function fmt(t){return `${(t/60)|0}:${('0'+(t|0)%60).slice(-2)}`}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function call(s){UI.call.textContent=s;clearTimeout(call.to);call.to=setTimeout(()=>UI.call.textContent='',3200)}function spark(){}
function draw(){let sx=0,sy=0;if(state.shake>0){state.shake-=.016;sx=(Math.random()-.5)*20;sy=(Math.random()-.5)*20}ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(-cam.x+sx,-cam.y+sy);let grd=ctx.createLinearGradient(0,0,arena.w,arena.h);grd.addColorStop(0,state.era==='bronze'?'#3b2417':'#2a2218');grd.addColorStop(1,state.era==='bronze'?'#7a4720':'#4a3a27');ctx.fillStyle=grd;ctx.fillRect(0,0,arena.w,arena.h);ctx.strokeStyle=state.era==='bronze'?'#b87333':'#7c6542';ctx.lineWidth=8;ctx.strokeRect(4,4,arena.w-8,arena.h-8);for(let i=0;i<90;i++){ctx.fillStyle='rgba(255,255,255,.04)';ctx.beginPath();ctx.arc((i*97)%arena.w,(i*53)%arena.h,2+(i%4),0,TAU);ctx.fill()}for(const f of state.fires){ctx.fillStyle='rgba(255,90,10,.28)';ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,TAU);ctx.fill()}for(const o of state.orbs){ctx.fillStyle='#55c7ff';ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,TAU);ctx.fill()}for(const p of state.projs){ctx.strokeStyle=p.color;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(p.x-p.vx*.03,p.y-p.vy*.03);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill()}for(const p of state.eprojs){ctx.fillStyle='#7b6a55';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill()}for(const e of state.enemies)drawEnemy(e);for(const p of state.pets){ctx.font='24px serif';ctx.fillText('🐕',p.x-12,p.y+8)}drawHero();ctx.restore()}
function drawHero(){let h=state.hero;ctx.save();ctx.globalAlpha=h.inv>0?.55:1;ctx.fillStyle=state.era==='bronze'?'#f0a23a':'#ddd0b5';ctx.beginPath();ctx.arc(h.x,h.y,h.r,0,TAU);ctx.fill();ctx.font='24px serif';ctx.textAlign='center';ctx.fillText(state.era==='bronze'?'🥉':'🧍',h.x,h.y+8);if(h.shield){ctx.strokeStyle='#ffd36a';ctx.lineWidth=3;ctx.beginPath();ctx.arc(h.x,h.y,h.r+8,0,TAU);ctx.stroke()}ctx.restore()}
function drawEnemy(e){if(e.tele>0){ctx.strokeStyle='rgba(255,0,0,.45)';ctx.lineWidth=28;ctx.beginPath();ctx.moveTo(e.x,e.y);let a=Math.atan2(state.hero.y-e.y,state.hero.x-e.x);ctx.lineTo(e.x+Math.cos(a)*420,e.y+Math.sin(a)*420);ctx.stroke()}ctx.fillStyle=e.boss?'#6b5d50':e.type==='wolf'?'#556070':'#6b3b2a';ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,TAU);ctx.fill();ctx.font=(e.boss?54:24)+'px serif';ctx.textAlign='center';ctx.fillText(e.emoji,e.x,e.y+e.r*.35);if(e.boss){ctx.fillStyle='#300';ctx.fillRect(e.x-70,e.y-e.r-22,140,8);ctx.fillStyle='#e33';ctx.fillRect(e.x-70,e.y-e.r-22,140*Math.max(0,e.hp/e.maxHp),8)}}
addEventListener('keydown',e=>{keys[e.key]=true;keys[e.key.toLowerCase()]=true});addEventListener('keyup',e=>{keys[e.key]=false;keys[e.key.toLowerCase()]=false});
let joyActive=false,jx=0,jy=0;UI.joy.addEventListener('pointerdown',e=>{joyActive=true;jx=e.clientX;jy=e.clientY;UI.joy.setPointerCapture(e.pointerId)});UI.joy.addEventListener('pointermove',e=>{if(!joyActive)return;let dx=e.clientX-jx,dy=e.clientY-jy,l=Math.min(55,Math.hypot(dx,dy)||0),a=Math.atan2(dy,dx);touchVec.x=Math.cos(a)*l/55;touchVec.y=Math.sin(a)*l/55;UI.knob.style.left=45+touchVec.x*55+'px';UI.knob.style.top=45+touchVec.y*55+'px'});UI.joy.addEventListener('pointerup',()=>{joyActive=false;touchVec.x=touchVec.y=0;UI.knob.style.left='45px';UI.knob.style.top='45px'});
</script></body></html>
